<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 32 32">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00e5ff"/>
      <stop offset="100%" stop-color="#a855f7"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="0.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect width="32" height="32" rx="8" fill="#0a0e1a"/>
  <rect x="1" y="1" width="30" height="30" rx="7" fill="none" stroke="url(#bg)" stroke-width="1.5" opacity="0.6"/>
  <!-- Gamepad body -->
  <g filter="url(#glow)" transform="translate(16,16)">
    <!-- Controller body -->
    <path d="M-9,0 C-9,-4 -6,-6 -3,-6 L3,-6 C6,-6 9,-4 9,0 C9,3 7,6 4,7 L3,7 C2,7 2,5 1,5 L-1,5 C-2,5 -2,7 -3,7 L-4,7 C-7,6 -9,3 -9,0Z" fill="url(#bg)" opacity="0.9"/>
    <!-- D-pad -->
    <rect x="-7" y="-1.2" width="4" height="2.4" rx="0.5" fill="#0a0e1a" opacity="0.7"/>
    <rect x="-6.2" y="-2" width="2.4" height="4" rx="0.5" fill="#0a0e1a" opacity="0.7"/>
    <!-- Buttons -->
    <circle cx="5" cy="-2" r="1.2" fill="#0a0e1a" opacity="0.6"/>
    <circle cx="7" cy="0" r="1.2" fill="#0a0e1a" opacity="0.6"/>
  </g>
</svg>
