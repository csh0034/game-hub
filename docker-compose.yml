services:
  redis:
    container_name: gamehub-redis
    image: redis:7-alpine
    ports:
      - "6389:6379"
    volumes:
      - redis-data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  redis-data:
